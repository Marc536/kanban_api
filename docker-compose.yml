version: "3.9"

services:

  api:
    build: .
    container_name: kanban_api
    ports:
      - "3000:3000"
    volumes:
      - .:/app
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/kanban

  postgres:
    image: postgres:15
    container_name: kanban_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kanban
    ports:
      - "5433:5432"
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

  postgres_test:
    image: postgres:15
    container_name: kanban_test_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kanban_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5
    ports:
      - "5434:5432"
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

  test:
    build: .
    container_name: kanban_tests
    command: npm test
    depends_on:
      postgres_test:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres_test:5432/kanban_test